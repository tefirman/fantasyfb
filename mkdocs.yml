site_name: fantasyfb
site_description: Fantasy football league simulation and optimization toolkit.
site_url: https://tefirman.github.io/fantasyfb/
repo_url: https://github.com/tefirman/fantasyfb
repo_name: tefirman/fantasyfb
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Install: install.md
  - Yahoo OAuth setup: yahoo-oauth.md
  - First weekly report: quickstart.md
  - CLI reference:
      - cli/index.md
      - fantasyfb: cli/fantasyfb.md
      - snake-draft: cli/snake-draft.md
      - salary-cap-draft: cli/salary-cap-draft.md
      - draft-prep: cli/draft-prep.md
  - Architecture: architecture.md
  - API reference:
      - api/index.md
      - League: api/league.md
      - Projections: api/projections.md
      - Simulation: api/sim.md
      - Drafts: api/drafts.md
      - Scoring: api/scoring.md
      - Data providers: api/data.md
      - I/O: api/io.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            heading_level: 2
            members_order: source
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tefirman/fantasyfb
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/fantasyfb/
