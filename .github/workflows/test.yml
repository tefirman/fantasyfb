name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run linting
      run: python run_tests.py lint
    
    - name: Setup Yahoo API credentials
      env:
        CONSUMER_KEY: ${{ secrets.CONSUMER_KEY }}
        CONSUMER_SECRET: ${{ secrets.CONSUMER_SECRET }}
      run: |
        echo "CONSUMER_KEY=$CONSUMER_KEY" > .env
        echo "CONSUMER_SECRET=$CONSUMER_SECRET" >> .env
    
    - name: Generate test fixtures
      run: python capture_fixtures.py
    
    - name: Run fixture-based tests
      run: python run_tests.py fixtures
    
    # Only run full tests on Python 3.10 to save CI time
    - name: Run all tests
      if: matrix.python-version == '3.10'
      run: python run_tests.py all
